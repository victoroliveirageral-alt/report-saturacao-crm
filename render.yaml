services:
  - type: web
    name: saturacao-crm-executive-stories
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: SOURCE_PANEL_API
        value: https://relatorio-campanhas-clevertap.onrender.com
      - key: PANEL_FALLBACK_URL
        value: https://report-saturacao-crm.onrender.com/
